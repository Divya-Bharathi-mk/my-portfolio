<section id="contact" class="py-5">

            <div class="card p-5 shadow-lg bg-dark text-white">

                <h3 class="mb-4">Contact Me</h3>

                <form>

                    <!-- Name -->
                    <div class="input-group mb-4">
                        <span class="input-group-text bg-secondary text-white border-0">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="Your Name" required>
                    </div>

                    <!-- Email -->
                    <div class="input-group mb-4">
                        <span class="input-group-text bg-secondary text-white border-0">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="Your Email" required>
                    </div>

                    <!-- Message -->
                    <div class="input-group mb-4">
                        <span class="input-group-text bg-secondary text-white border-0">
                            <i class="bi bi-chat-dots-fill"></i>
                        </span>
                        <textarea class="form-control bg-dark text-white border-secondary" rows="4" placeholder="Your Message"></textarea>
                    </div>

                    <!-- Button -->
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-send-fill me-2"></i>Send Message
                    </button>

                </form>

            </div>
